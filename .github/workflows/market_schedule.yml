name: Market Data Tracker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install growwapi 

      - name: Create the API key file
        run: echo "${{ secrets.MY_API_KEY }}" > key

      - name: Run the Python script
        # IMPORTANT: Change market_tracker.py if your file is named differently
        run: python market_tracker.py 

      - name: Commit and push JSON data
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add market_data_50.json
          git commit -m "Auto-update market data" || exit 0
          git push
