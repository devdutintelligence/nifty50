name: Market Data Tracker

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install growwapi 

      - name: Run the Python script
        # 👇 The secret is securely injected into the environment here
        env:
          MY_API_KEY: ${{ secrets.MY_API_KEY }}
        run: python market_tracker.py 

      - name: Commit and push JSON snapshot
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add market_data_50.json
          git commit -m "Overwrite with latest market data snapshot" || exit 0
          git push
